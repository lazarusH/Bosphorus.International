name: Keep Supabase Project Alive

on:
  schedule:
    # Runs every day at 08:00 UTC - well within the 7-day pause window
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase at $(date)..."

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/courses?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(cat /tmp/response.json)"

          # Fail the job if the response is not 2xx
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "❌ Supabase ping FAILED with status $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Supabase is alive and responding!"
